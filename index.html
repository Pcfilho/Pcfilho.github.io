<style>
  :root{

    --wall:url('assets/wall.webp');
    --ios-glass:rgba(255,255,255,.2); --ios-glass-brd:rgba(255,255,255,.32);
    --ios-dock:rgba(255,255,255,.2); --ios-dock-brd:rgba(255,255,255,.28);
  }
  :root[data-theme="dark"]{
    --bg:#14110d; --panel:#1f1a15; --panel2:#251f18; --text:#f3eee6; --dim:#a59b8c;
    --border:#322b22; --accent:#ff7e33; --accent2:#ffa869; --accent-soft:rgba(255,126,51,.16);

    --wall:url('assets/wall.webp');
    --ios-glass:rgba(28,26,38,.45); --ios-glass-brd:rgba(255,255,255,.14);
    --ios-dock:rgba(20,18,30,.5); --ios-dock-brd:rgba(255,255,255,.12);
  }
  html{scroll-behavior:smooth;}
  html,body{margin:0;padding:0;background:var(--bg);}
  /* iOS fix: overflow-x:hidden forces used overflow-y to auto, turning html+body
     into nested scroll containers (page rubber-bands and snaps back on iOS).
     overflow-x:clip clips horizontally without making body a scroll container. */
  body{overflow-x:clip;}
  *{box-sizing:border-box;}
  section[id]{scroll-margin-top:96px;}
  body *{transition:background-color .4s ease, color .4s ease, border-color .4s ease, box-shadow .4s ease;}
  ::selection{background:var(--accent);color:#fff;}
  @keyframes pb-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,106,26,.45)}70%{box-shadow:0 0 0 9px rgba(255,106,26,0)}}
  @keyframes pb-fade{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pb-reveal{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
  section ~ section{animation:pb-reveal both;animation-timeline:view();animation-range:entry 0% cover 28%;}
  @media (prefers-reduced-motion:reduce){section ~ section{animation:none;} html{scroll-behavior:auto;}}

  /* hover behaviours (ported from the design's style-hover hints) */
  .pb-cta{transition:transform .2s ease, box-shadow .2s ease;}
  .pb-cta-primary:hover{transform:translateY(-2px);box-shadow:0 16px 32px var(--accent-soft);}
  .pb-cta-ghost:hover{transform:translateY(-2px);}
  .pb-app{transition:transform .18s ease;}
  .pb-app:hover{transform:translateY(-4px) scale(1.05);}
  .pb-dock{transition:transform .18s ease;}
  .pb-dock:hover{transform:translateY(-4px) scale(1.06);}
  .pb-pet-img{transition:transform .35s cubic-bezier(.22,1,.36,1);}
  .pb-pet:hover .pb-pet-img{transform:scale(1.06) translateY(-2px);}

  /* hand-drawn "directional cue": handwritten caption + sketched arrow pointing
     at the phone, deliberately off the site's clean grid to draw the eye */
  /* hidden until the Caveat web font is ready, so it never flashes in the chunky
     Comic Sans / cursive fallback (which renders ~40% wider) on first paint */
  .pb-annot{position:absolute;left:-150px;top:286px;z-index:3;display:inline-flex;flex-direction:column;align-items:flex-end;gap:3px;cursor:pointer;background:none;border:none;padding:0;font-family:inherit;opacity:0;transition:opacity .3s ease;}
  html.pb-fonts-ready .pb-annot{opacity:1;}
  .pb-annot-txt{font-family:'Caveat','Comic Sans MS',cursive;font-weight:700;font-size:24px;color:var(--accent);line-height:1;white-space:nowrap;transform:rotate(-4deg);}
  .pb-annot-arrow{display:block;color:var(--accent);}
  .pb-annot-arrow.pb-arr-l{margin-right:8px;}
  .pb-annot-arrow.pb-arr-down{display:none;}
  .pb-annot-txt,.pb-annot-arrow{transition:transform .22s ease;}
  .pb-annot:hover .pb-annot-txt{transform:rotate(-4deg) translateY(-2px) scale(1.03);}
  .pb-annot:hover .pb-annot-arrow{transform:translateY(3px);}
  /* the left-gutter placement only has room on wide screens; below that fall
     back to the centered-above-phone treatment with a downward arrow */
  @media (max-width:1080px){ .pb-annot{position:static;align-items:center;margin:2px auto 8px;} .pb-annot-arrow.pb-arr-l{display:none;} .pb-annot-arrow.pb-arr-down{display:block;} }
  @media (prefers-reduced-motion:reduce){ .pb-annot-txt,.pb-annot-arrow{transition:none;} }

  /* "tap an app" coach-mark: a pulsing ring + a cursor that taps the first app
     icon, the standard tappability signifier. Decorative (pointer-events:none),
     overlaid on the real icon so it tracks layout; removed after the first tap. */
  @keyframes pb-tapring{0%{transform:scale(.5);opacity:0}18%{opacity:.9}100%{transform:scale(1.75);opacity:0}}
  @keyframes pb-poke-dl{0%,52%,100%{transform:translate(0,0) scale(1)}60%{transform:translate(4px,-5px) scale(.84)}70%{transform:translate(0,0) scale(1)}}
  .pb-taphint{position:absolute;inset:0;pointer-events:none;z-index:5;}
  .pb-taphint .ring{position:absolute;inset:-5px;border-radius:19px;border:2.5px solid #fff;box-shadow:0 0 13px rgba(255,255,255,.55);animation:pb-tapring 1.7s ease-out infinite;}
  .pb-taphint .poke{position:absolute;}
  .pb-taphint .pk{display:inline-block;animation-duration:1.7s;animation-timing-function:ease-in-out;animation-iteration-count:infinite;filter:drop-shadow(0 2px 5px rgba(0,0,0,.55));}
  .pb-taphint .pk-emoji{display:block;font-size:30px;line-height:1;}
  @media (prefers-reduced-motion:reduce){ .pb-taphint .ring{animation:none;opacity:.65;} .pb-taphint .pk{animation:none;} }
  button{font-family:'Manrope',system-ui,sans-serif;}
  a{-webkit-tap-highlight-color:transparent;}
  img{-webkit-user-drag:none;user-select:none;}
  .pb-appicon img{pointer-events:none;}

  /* responsive: the source was a fixed-size preview; stack columns on small screens */
  @media (max-width:820px){
    .pb-hero{grid-template-columns:1fr !important;gap:36px !important;padding-top:96px !important;}
    .pb-about{grid-template-columns:1fr !important;text-align:center;gap:22px !important;}
    .pb-about > div:first-child{justify-self:center;}
    .pb-skills-grid{grid-template-columns:1fr !important;}
  }
  @media (max-width:500px){
    .pb-hero{padding-left:14px !important;padding-right:14px !important;}
  }
  @media (max-width:360px){
    .pb-hero > div:last-child > div{width:300px !important;height:618px !important;}
  }

  /* phone "liveliness" */
  @keyframes pb-spin{to{transform:rotate(360deg)}}
  @keyframes pb-eq{0%,100%{transform:scaleY(.28)}50%{transform:scaleY(1)}}
  .pb-dot{transition:width .3s ease, opacity .3s ease;}
  .pb-app, .pb-dock{ touch-action:manipulation; }
  @media (prefers-reduced-motion:reduce){
    [style*="pb-spin"],[style*="pb-eq"]{animation:none !important;}
  }

  /* iOS-style edit (jiggle) mode */
  @keyframes pb-jigA{0%,100%{transform:rotate(-1.6deg)}50%{transform:rotate(1.7deg)}}
  @keyframes pb-jigB{0%,100%{transform:rotate(1.5deg)}50%{transform:rotate(-1.8deg)}}
  .pb-jig{animation:pb-jigA .3s ease-in-out infinite;}
  .pb-appicon:nth-child(2n) .pb-jig{animation-name:pb-jigB;animation-duration:.34s;}
  .pb-appicon:nth-child(3n) .pb-jig{animation-duration:.27s;}
  .pb-appicon{transition:transform .2s cubic-bezier(.2,.8,.2,1);}
  @keyframes pb-deny{0%,100%{transform:translateX(0)}15%{transform:translateX(-5px)}30%{transform:translateX(5px)}45%{transform:translateX(-4px)}60%{transform:translateX(4px)}75%{transform:translateX(-2px)}}
  .pb-deny{animation:pb-deny .42s ease;}
  @media (prefers-reduced-motion:reduce){ .pb-jig{animation:none !important;} }
</style>

<script>
"use strict";
(function(){
  var esc = function(s){ return String(s).replace(/[&<>"']/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  }); };

  // On touch devices the phone's two home pages must NOT be internal scroll
  // containers: an overflow-y:auto subtree captures the vertical pan on iOS
  // WebKit and the page can't scroll over the phone. So on touch we drop their
  // inner scroll (overflow-y:hidden) and the pan chains to the document; every
  // tap still works and the pager keeps horizontal swipes (touch-action:pan-y).
  // Desktop keeps overflow-y:auto so the mouse wheel can scroll inside the phone.
  var PB_TOUCH = (typeof matchMedia === 'function' && matchMedia('(pointer:coarse)').matches) || ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  var PB_HOME_OVERFLOW = PB_TOUCH ? 'hidden' : 'auto';

  // ── State (persisted, mirrors the original DCLogic) ──────────────────────
  var state = {
    lang:  (function(){ try{ return localStorage.getItem('pb_lang') || ((navigator.language||'en').toLowerCase().slice(0,2)==='pt' ? 'pt' : 'en'); }catch(e){ return 'en'; } })(),
    theme: (function(){ try{ return localStorage.getItem('pb_theme') || 'light'; }catch(e){ return 'light'; } })(),
    openApp: null,
    journeyOpen: null,

    editMode: false,

    hinted: (function(){ try{ return localStorage.getItem('pb_hinted')==='1'; }catch(e){ return false; } })()

  // ── Live status-bar clock ────────────────────────────────────────────────
  function tickClock(){
    var el = document.getElementById('pb-clock');
    if(!el) return;
    var d = new Date(), h = d.getHours(), mn = d.getMinutes();
    el.textContent = h + ':' + (mn<10?'0':'') + mn;
  }

  // ── Home-screen pager (swipe + dots) ─────────────────────────────────────
  function setPage(i){
    i = i < 0 ? 0 : (i > 1 ? 1 : i);
    state.page = i;
    var track = document.getElementById('pb-track');
    if(track){ track.style.transition = 'transform .42s cubic-bezier(.22,1,.36,1)'; track.style.transform = 'translateX(-' + (i*50) + '%)'; }
    var dots = document.querySelectorAll('[data-pbdot]');
    for(var d=0; d<dots.length; d++){
      var on = (+dots[d].getAttribute('data-pbdot') === i);
      dots[d].style.width = on ? '18px' : '6px';
      dots[d].style.opacity = on ? '1' : '.45';
    }
  }

  function wirePager(){
    var pager = document.getElementById('pb-pager');
    var track = document.getElementById('pb-track');
    if(!pager || !track) return;
    var startX=0, startY=0, dx=0, vpW=0, dragging=false, decided=false, horizontal=false, moved=false;
    function onMove(e){
      if(!dragging) return;
      dx = e.clientX - startX;
      var dy = e.clientY - startY;
      if(!decided){
        if(Math.abs(dx) > 7 || Math.abs(dy) > 7){ decided=true; horizontal = Math.abs(dx) > Math.abs(dy); }
        else return;
      }
      if(!horizontal) return;            // vertical intent: let the page scroll
      if(e.cancelable) e.preventDefault();
      if(Math.abs(dx) > 9) moved = true;
      var pos = -state.page*vpW + dx;
      var min = -vpW, max = 0;
      if(pos > max) pos = max + (pos-max)*0.32;
      if(pos < min) pos = min + (pos-min)*0.32;
      track.style.transform = 'translateX(' + pos + 'px)';
    }
    function onUp(){
      if(!dragging) return;
      dragging = false;
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('pointercancel', onUp);
      if(horizontal){
        var th = vpW * 0.2, np = state.page;
        if(dx < -th && state.page < 1) np = 1;
        else if(dx > th && state.page > 0) np = 0;
        setPage(np);
      } else {
        track.style.transition = 'transform .3s ease';
        track.style.transform = 'translateX(-' + (state.page*50) + '%)';
      }
      if(moved){ pager._swiped = true; setTimeout(function(){ pager._swiped = false; }, 60); }
    }
    track.addEventListener('pointerdown', function(e){
      if(state.editMode) return;
      if(e.button !== undefined && e.button !== 0) return;
      startX=e.clientX; startY=e.clientY; dx=0; dragging=true; decided=false; horizontal=false; moved=false;
      vpW = pager.clientWidth || 1;
      track.style.transition = 'none';
      // listen on window so the swipe keeps working when the finger leaves the phone
      window.addEventListener('pointermove', onMove, {passive:false});
      window.addEventListener('pointerup', onUp);
      window.addEventListener('pointercancel', onUp);
    });
    // swallow the click that follows a real swipe so it doesn't open an app
    track.addEventListener('click', function(e){ if(pager._swiped){ e.stopPropagation(); e.preventDefault(); } }, true);
  }

  // ── iOS edit mode: long-press to jiggle, drag to rearrange ───────────────
  function wireAppGrid(){
    var grid = document.getElementById('pb-appgrid');
    if(!grid) return;
    function cells(){ return Array.prototype.slice.call(grid.querySelectorAll('.pb-appicon')); }

    var pressTimer=null, sx=0, sy=0;
    var dragging=false, origin=null, fromIndex=0, curTo=0, slots=[], grabDX=0, grabDY=0;

    function clearPress(){ if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; } }

    function onDown(e){
      var cell = e.target.closest && e.target.closest('.pb-appicon');
      if(!cell) return;
      if(e.target.closest('.pb-del')) return;
      sx=e.clientX; sy=e.clientY;
      if(state.editMode){
        beginDrag(cell, e);
      } else {
        clearPress();
        pressTimer = setTimeout(function(){
          pressTimer=null;
          if(navigator.vibrate){ try{ navigator.vibrate(8); }catch(_){} }
          PB.enterEdit();
        }, 450);
      }
    }
    function onMove(e){
      if(pressTimer && (Math.abs(e.clientX-sx)>8 || Math.abs(e.clientY-sy)>8)) clearPress();
      if(dragging) duringDrag(e);
    }
    function onUp(){ clearPress(); if(dragging) endDrag(); }

    function beginDrag(cell, e){
      dragging=true; origin=cell;
      var list=cells(); fromIndex=list.indexOf(cell); curTo=fromIndex;
      slots = list.map(function(el){ var r=el.getBoundingClientRect(); return {cx:r.left+r.width/2, cy:r.top+r.height/2}; });
      grabDX = e.clientX - slots[fromIndex].cx;
      grabDY = e.clientY - slots[fromIndex].cy;
      origin.style.transition='none'; origin.style.zIndex='60';
      var jig = origin.querySelector('.pb-jig'); if(jig) jig.style.animation='none';
      window.addEventListener('pointermove', onMove, {passive:false});
      window.addEventListener('pointerup', onUp);
      window.addEventListener('pointercancel', onUp);
    }
    function duringDrag(e){
      if(e.cancelable) e.preventDefault();
      var dx=(e.clientX-grabDX)-slots[fromIndex].cx, dy=(e.clientY-grabDY)-slots[fromIndex].cy;
      origin.style.transform='translate('+dx+'px,'+dy+'px) scale(1.12)';
      var to=fromIndex, best=1e9;
      for(var i=0;i<slots.length;i++){ var d=Math.hypot(slots[i].cx-e.clientX, slots[i].cy-e.clientY); if(d<best){ best=d; to=i; } }
      if(to!==curTo){ curTo=to; layoutShift(); }
    }
    function layoutShift(){
      var list=cells();
      for(var i=0;i<list.length;i++){
        if(i===fromIndex) continue;
        var disp=i;
        if(fromIndex<curTo){ if(i>fromIndex && i<=curTo) disp=i-1; }
        else if(fromIndex>curTo){ if(i>=curTo && i<fromIndex) disp=i+1; }
        list[i].style.transform = (disp===i) ? '' : 'translate('+(slots[disp].cx-slots[i].cx)+'px,'+(slots[disp].cy-slots[i].cy)+'px)';
      }
    }
    function endDrag(){
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('pointercancel', onUp);
      dragging=false;
      var keys = cells().map(function(el){ return el.getAttribute('data-key'); });
      var moved = keys.splice(fromIndex,1)[0];
      keys.splice(curTo,0,moved);
      state.appOrder = keys;
      save('pb_apporder', JSON.stringify(keys));
      origin=null;
      render();
    }

    grid.addEventListener('pointerdown', onDown);
    grid.addEventListener('pointermove', onMove);
    grid.addEventListener('pointerup', onUp);       // cancels the long-press timer on a quick tap
    grid.addEventListener('pointercancel', onUp);
  }

  // ── Easter egg: Konami code → confetti ───────────────────────────────────
  function confetti(){
    var colors = ['#ff6a1a','#ff8a3d','#9b4bd6','#5b8cff','#2dd4bf','#ffd34d'];
    for(var i=0;i<110;i++){
      var d = document.createElement('div');
      var sz = 6 + Math.random()*8;
      d.style.cssText = 'position:fixed;top:-24px;left:'+(Math.random()*100)+'vw;width:'+sz+'px;height:'+(sz*0.5)+'px;background:'+colors[i%colors.length]+';z-index:99999;border-radius:2px;pointer-events:none;';
      document.body.appendChild(d);
      var dur = 2200 + Math.random()*1900;
      (function(node,dur){
        node.animate(
          [{transform:'translateY(0) rotate(0deg)',opacity:1},
           {transform:'translateY('+(window.innerHeight+80)+'px) rotate('+(360+Math.random()*720)+'deg)',opacity:.9}],
          {duration:dur, easing:'cubic-bezier(.2,.6,.4,1)'});
        setTimeout(function(){ node.remove(); }, dur);
      })(d,dur);
    }
  }
  function toast(msg){
    var t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:99999;background:var(--text);color:var(--bg);font-weight:800;font-size:13px;padding:10px 18px;border-radius:999px;box-shadow:0 12px 34px rgba(0,0,0,.35);font-family:Manrope,system-ui,sans-serif;opacity:0;transition:opacity .25s ease, top .25s ease;';
    document.body.appendChild(t);
    requestAnimationFrame(function(){ t.style.opacity='1'; t.style.top='72px'; });
    setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ t.remove(); }, 320); }, 2700);
  }
  // iOS-style push notification, rendered INSIDE the phone screen
  function phoneNotify(msg){
    var screen = document.getElementById('pb-screen');
    if(!screen){ toast(msg); return; }
    var prev = screen.querySelector('.pb-push'); if(prev) prev.remove();
    var pt = state.lang==='pt';
    var el = document.createElement('div');
    el.className = 'pb-push';
    el.style.cssText = 'position:absolute;top:54px;left:10px;right:10px;z-index:30;display:flex;gap:10px;align-items:center;padding:11px 12px;border-radius:20px;background:rgba(250,250,250,.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 12px 32px rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.55);transform:translateY(-170%);opacity:0;transition:transform .5s cubic-bezier(.2,.9,.3,1.25),opacity .3s ease;font-family:Manrope,system-ui,sans-serif;';
    el.innerHTML = '<div style="width:38px;height:38px;border-radius:10px;flex:none;overflow:hidden;position:relative;background:linear-gradient(135deg,#ff8a3d,#9b4bd6);display:flex;align-items:center;justify-content:center;"><span style="color:#fff;font-weight:800;font-size:13px;">PB</span><img src="assets/portrait.webp" draggable="false" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" onerror="this.remove()"></div>'
      + '<div style="min-width:0;flex:1;">'
      +   '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;"><span style="font-size:12px;font-weight:800;color:#111;">Paulo Barroso</span><span style="font-size:11px;color:#666;font-weight:600;flex:none;">'+(pt?'agora':'now')+'</span></div>'
      +   '<div style="font-size:12.5px;line-height:1.35;color:#1c1c1c;margin-top:1px;">'+esc(msg)+'</div>'
      + '</div>';
    screen.appendChild(el);
    requestAnimationFrame(function(){ el.style.transform='translateY(0)'; el.style.opacity='1'; });
    setTimeout(function(){ el.style.transform='translateY(-170%)'; el.style.opacity='0'; setTimeout(function(){ el.remove(); }, 520); }, 2900);
  }

  var KONAMI = ['arrowup','arrowup','arrowdown','arrowdown','arrowleft','arrowright','arrowleft','arrowright','b','a'];
  var kPos = 0;
  window.addEventListener('keydown', function(e){
    var k = (e.key || '').toLowerCase();
    if(k === KONAMI[kPos]){
      kPos++;
      if(kPos === KONAMI.length){ kPos = 0; confetti(); toast(state.lang==='pt' ? '🎉 Você achou o segredo!' : '🎉 You found the secret!'); }
    } else {
      kPos = (k === KONAMI[0]) ? 1 : 0;
    }
  });

  // exit edit mode: Escape, or tapping empty space inside the phone
  window.addEventListener('keydown', function(e){ if(e.key==='Escape' && state.editMode){ PB.exitEdit(); } });
  document.addEventListener('click', function(e){
    if(!state.editMode) return;
    var t = e.target;
    if(t.closest && (t.closest('.pb-appicon') || t.closest('.pb-del'))) return;
    if(t.closest && t.closest('#pb-pager')) PB.exitEdit();
  });

  // ── Controller (global, survives re-render via inline handlers) ──────────
  window.PB = {
    setEN: function(){ if(state.lang!=='en'){ state.lang='en'; save('pb_lang','en'); render(); } },
    setPT: function(){ if(state.lang!=='pt'){ state.lang='pt'; save('pb_lang','pt'); render(); } },
    toggleTheme: function(){
      state.theme = state.theme==='dark' ? 'light' : 'dark';
      save('pb_theme', state.theme);
      document.documentElement.setAttribute('data-theme', state.theme);
      if (window.DogGame) window.DogGame.setTheme(state.theme);
      var btn = document.getElementById('pb-theme-btn');
      if(btn) btn.textContent = state.theme==='dark' ? '☀' : '☾';
    },
    openApp: function(k){ if(state.editMode) return; if(!state.hinted){ state.hinted=true; save('pb_hinted','1'); } state.openApp = k; render(); },
    closeApp: function(){ if(state.openApp){ state.openApp = null; render(); } },
    toggleJourney: function(i){ state.journeyOpen = (state.journeyOpen===i ? null : i); render(); },
    goPage: function(i){ setPage(i); },
    goAbout: function(){ if(state.editMode) return; var el=document.getElementById('about'); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); },
    enterEdit: function(){ if(!state.editMode){ state.editMode = true; render(); } },
    exitEdit: function(ev){ if(ev && ev.stopPropagation) ev.stopPropagation(); if(state.editMode){ state.editMode = false; render(); } },
    tryDelete: function(key, ev){
      if(ev){ ev.stopPropagation(); ev.preventDefault(); }
      var pt = state.lang==='pt';
      var msgs = pt
        ? ['🙅 Você não apaga a minha história!', '🚀 Esse foi publicado na App Store. Fica.', '😄 Boa tentativa! Esse aqui eu não deleto.', '❤️ Apagar anos de trabalho? Jamais.']
        : ["🙅 You can't delete my story!", '🚀 That one shipped to the App Store. It stays.', '😄 Nice try! This app is here to stay.', '❤️ Erase years of work? Never.'];
      phoneNotify(msgs[Math.floor(Math.random()*msgs.length)]);
      var cell = document.querySelector('.pb-appicon[data-key="'+key+'"]');
      if(cell){ cell.classList.remove('pb-deny'); void cell.offsetWidth; cell.classList.add('pb-deny'); }
    },
    poke: function(ev){
      if(ev && ev.stopPropagation) ev.stopPropagation();
      var notch = ev && ev.currentTarget, frame = notch && notch.parentElement;
      if(!frame || frame.querySelector('.pb-island')) return;
      var el = document.createElement('div');
      el.className = 'pb-island';
      el.textContent = state.lang==='pt' ? '🎧 codando • jazz' : '🎧 coding • jazz';
      el.style.cssText = 'position:absolute;top:18px;left:50%;transform:translateX(-50%) scale(.85);background:#0b0b0d;color:#fff;font-size:12px;font-weight:700;padding:9px 16px;border-radius:999px;z-index:8;white-space:nowrap;box-shadow:0 8px 22px rgba(0,0,0,.55);font-family:Manrope,system-ui,sans-serif;opacity:0;transition:opacity .25s ease, transform .4s cubic-bezier(.22,1,.36,1);';
      frame.appendChild(el);
      requestAnimationFrame(function(){ el.style.opacity='1'; el.style.transform='translateX(-50%) scale(1)'; });
      setTimeout(function(){ el.style.opacity='0'; el.style.transform='translateX(-50%) scale(.85)'; setTimeout(function(){ el.remove(); }, 320); }, 2400);
    }
  };

  document.documentElement.setAttribute('data-theme', state.theme);
  render();
  // reveal the handwritten annotation only once Caveat has loaded (no FOUT flash)
  (function(){
    var ready = function(){ document.documentElement.classList.add('pb-fonts-ready'); };
    if(document.fonts && document.fonts.ready){ document.fonts.ready.then(ready); setTimeout(ready, 1500); }
    else { ready(); }
  })();
  setInterval(tickClock, 15000);
})();
</script>
